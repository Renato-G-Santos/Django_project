{% extends 'template.html' %}

{% block content %}
    <h1>Product List</h1>
    <div class="row">
        {% for produto in product %}
            <div class="col-md-4">
                <div class="card mb-4 shadow-sm">
                    <img src="{{ produto.image.url }}" class="card-img-top" alt="{{ produto.name }}">
                    <div class="card-body">
                        <h5 class="card-title">{{ produto.name }}</h5>
                        <p class="card-text">{{ produto.description }}</p>
                        <p class="card-text"><strong>Price:</strong> ${{ produto.value }}</p>
                        <p class="card-text"><strong>Category:</strong> {{ produto.category.name }}</p>
                        <p class="card-text"><strong>Stock:</strong> {{ produto.stock }}</p>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
{% endblock %}
